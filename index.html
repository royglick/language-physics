<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Swarm — instructions for a good life</title>
<style>
  html,body{ margin:0; height:100%; background:#fff; }
  body{ display:flex; align-items:center; justify-content:center; }
  /* 9:16 frame — Instagram Reels / Stories (1080×1920), as large as the window allows */
  #stage{
    position:relative; overflow:hidden; background:#fff;
    width:min(100vw, calc(100dvh * 9 / 16));
    aspect-ratio:9 / 16;
    box-shadow:0 0 0 1px rgba(0,0,0,.08);   /* faint outline so the frame is visible while composing */
  }
  #stage canvas{ display:block; }
  #hint{
    position:absolute; left:16px; bottom:14px; margin:0;
    font:13px ui-monospace,Menlo,Consolas,monospace; letter-spacing:.05em;
    color:#2b2824; opacity:.4; transition:opacity 1s ease; pointer-events:none;
  }
  #hint.gone{ opacity:0; }
</style>
</head>
<body>
<div id="stage">
  <p id="hint">move through them</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
<script src="swarm.js"></script>
</body>
</html>
